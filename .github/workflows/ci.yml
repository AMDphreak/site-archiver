name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dlang-community/setup-dlang@v1
        with:
          compiler: ldc-latest
      - name: Build CLI
        run: dub build :site-downloader-cli --build=release
      - name: Build GUI
        run: dub build :site-downloader-gui --build=release
